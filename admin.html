<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約管理 | 福元鍼灸整骨院</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 管理ヘッダー -->
    <header class="admin-header">
        <div class="admin-logo">
            <div class="admin-logo-icon">管</div>
            <span>予約管理ダッシュボード — 福元鍼灸整骨院</span>
        </div>
        <div class="admin-header-actions">
            <button class="btn-admin-outline" onclick="openMailSettings()">✉ メール設定</button>
            <button class="btn-admin-orange" onclick="exportCsv()">⬇ CSV出力</button>
            <button class="btn-admin-outline" onclick="window.location.href='index.html'">← 予約ページへ</button>
        </div>
    </header>

    <!-- KPIカード -->
    <div class="kpi-row" id="kpiRow">
        <div class="kpi-card"><div class="label">本日の予約</div><div class="value" id="kpiToday">0件</div></div>
        <div class="kpi-card"><div class="label">今月の予約数</div><div class="value" id="kpiMonth">0件</div></div>
        <div class="kpi-card"><div class="label">新規患者数</div><div class="value orange" id="kpiNew">0名</div></div>
        <div class="kpi-card"><div class="label">未確認予約</div><div class="value red" id="kpiPending">0件</div></div>
    </div>

    <div class="admin-main">

        <!-- フィルターパネル -->
        <aside class="filter-panel">
            <div class="filter-title">絞り込み</div>
            <div class="filter-label">日付</div>
            <input type="date" class="filter-date-input" id="filterDate" onchange="applyFilter()">
            <div class="filter-divider"></div>
            <div class="filter-label">ステータス</div>
            <button class="filter-btn active" data-status="all" onclick="setStatusFilter(this)">全て</button>
            <button class="filter-btn" data-status="pending" onclick="setStatusFilter(this)">未確認</button>
            <button class="filter-btn" data-status="confirmed" onclick="setStatusFilter(this)">確認済み</button>
            <button class="filter-btn" data-status="cancelled" onclick="setStatusFilter(this)">キャンセル</button>
            <button class="filter-clear-btn" onclick="clearFilter()">× フィルタをクリア</button>
        </aside>

        <!-- 予約テーブル -->
        <div class="table-panel">
            <div class="table-header">
                <h2>予約一覧 <span id="tableCount" style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:8px;"></span></h2>
                <div class="table-controls">
                    <input type="text" class="search-input" id="searchInput" placeholder="🔍 患者名で検索" oninput="applyFilter()">
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>予約日時</th>
                            <th>患者名</th>
                            <th>初診/再診</th>
                            <th>症状</th>
                            <th>連絡先</th>
                            <th>ステータス</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 詳細モーダル -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h3>予約詳細</h3>
                <button class="modal-close" onclick="closeModal('detailModal')">×</button>
            </div>
            <div class="modal-body" id="detailModalBody"></div>
            <div class="modal-footer" id="detailModalFooter"></div>
        </div>
    </div>

    <!-- メール設定モーダル -->
    <div class="modal-overlay" id="mailModal">
        <div class="modal">
            <div class="modal-header">
                <h3>✉ 管理者メール設定</h3>
                <button class="modal-close" onclick="closeModal('mailModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="info-box" style="margin-bottom:16px;">
                    患者からの予約が入ると、登録したメールアドレスへ通知メールが送信されます（予約フォームから mailto: リンクで起動）。
                </div>
                <div class="mail-settings-form">
                    <div class="form-group">
                        <label>管理者メールアドレス</label>
                        <input type="email" id="adminEmailInput" placeholder="clinic@example.com">
                    </div>
                    <div class="form-group">
                        <label>院名 / 担当者名</label>
                        <input type="text" id="adminNameInput" placeholder="福元鍼灸整骨院 担当者">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" onclick="closeModal('mailModal')">キャンセル</button>
                <button class="btn btn-primary btn-sm" style="width:auto;height:34px;" onclick="saveMailSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="admin.js"></script>
</body>
</html>
