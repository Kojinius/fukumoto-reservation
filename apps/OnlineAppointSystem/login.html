<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフログイン | 〇〇△△医院</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--beige);
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius-card);
            box-shadow: 0 8px 40px rgba(115,87,99,.13);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .login-logo-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: var(--brown);
            color: var(--white);
            font-size: 16px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .login-logo-text h1 { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .login-logo-text span { font-size: 11px; color: var(--text-muted); }
        .login-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 24px; }
        .login-error {
            background: #FFF0F0;
            border: 1px solid #F5C6C6;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--red);
            margin-bottom: 16px;
            display: none;
        }
        .login-error.visible { display: block; }
        .login-success {
            background: #F0FFF4;
            border: 1px solid #9AE6B4;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #276749;
            margin-bottom: 16px;
            display: none;
        }
        .login-success.visible { display: block; }
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            cursor: pointer;
            text-decoration: underline;
        }
        .forgot-link:hover { color: var(--brown); }
        #resetForm { display: none; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">管</div>
                <div class="login-logo-text">
                    <h1 id="clinic-name-heading">〇〇△△医院</h1>
                    <span>スタッフ専用ログイン</span>
                </div>
            </div>
            <p class="login-title" id="formTitle">ログイン</p>
            <div class="login-error" id="loginError"></div>
            <div class="login-success" id="loginSuccess"></div>

            <!-- ログインフォーム -->
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="loginEmail" placeholder="staff@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:8px;" id="loginBtn">ログイン</button>
                <span class="forgot-link" id="showResetLink">パスワードをお忘れの方</span>
            </form>

            <!-- パスワード再設定フォーム -->
            <form id="resetForm" novalidate>
                <div class="form-group">
                    <label>登録済みメールアドレス</label>
                    <input type="email" id="resetEmail" placeholder="staff@example.com" autocomplete="email" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:8px;" id="resetBtn">再設定メールを送信</button>
                <span class="forgot-link" id="showLoginLink">ログインに戻る</span>
            </form>
        </div>
    </div>

    <script type="module">
        import { login, sendPasswordReset } from "./js/auth.js";
        import { db } from "./js/firebase.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { applyTheme } from "./js/utils.js";

        // 院名・ロゴをヘッダーに反映
        (async () => {
            const snap = await getDoc(doc(db, 'settings', 'clinic'));
            if (snap.exists()) {
                const data = snap.data();
                if (data.clinicName) {
                    document.getElementById('clinic-name-heading').textContent = data.clinicName;
                    document.title = document.title.replace(/ [^|]+$/, ` ${data.clinicName}`);
                }
                if (data.colorTheme) applyTheme(data.colorTheme);
                if (data.clinicLogo) {
                    const logoIcon = document.querySelector('.login-logo-icon');
                    if (logoIcon) {
                        logoIcon.innerHTML = `<img src="${data.clinicLogo}" alt="ロゴ">`;
                        logoIcon.style.background = 'transparent';
                    }
                }
            }
        })();

        const loginForm  = document.getElementById('loginForm');
        const resetForm  = document.getElementById('resetForm');
        const errEl      = document.getElementById('loginError');
        const successEl  = document.getElementById('loginSuccess');
        const formTitle  = document.getElementById('formTitle');
        const loginBtn   = document.getElementById('loginBtn');
        const resetBtn   = document.getElementById('resetBtn');

        function showError(msg)   { errEl.textContent = msg; errEl.classList.add('visible'); successEl.classList.remove('visible'); }
        function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('visible'); errEl.classList.remove('visible'); }
        function clearMessages()  { errEl.classList.remove('visible'); successEl.classList.remove('visible'); }

        // ログインフォーム
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            loginBtn.disabled    = true;
            loginBtn.textContent = 'ログイン中...';

            const email    = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                await login(email, password);
                window.location.href = 'admin.html';
            } catch (err) {
                showError(err.message);
                loginBtn.disabled    = false;
                loginBtn.textContent = 'ログイン';
            }
        });

        // パスワード再設定フォーム
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            resetBtn.disabled    = true;
            resetBtn.textContent = '送信中...';

            const email = document.getElementById('resetEmail').value.trim();

            try {
                await sendPasswordReset(email);
                showSuccess('再設定用メールを送信しました。メールをご確認ください。');
            } catch (err) {
                showError(err.message);
            } finally {
                resetBtn.disabled    = false;
                resetBtn.textContent = '再設定メールを送信';
            }
        });

        // フォーム切り替え
        document.getElementById('showResetLink').addEventListener('click', () => {
            clearMessages();
            loginForm.style.display = 'none';
            resetForm.style.display = 'block';
            formTitle.textContent   = 'パスワード再設定';
        });
        document.getElementById('showLoginLink').addEventListener('click', () => {
            clearMessages();
            resetForm.style.display = 'none';
            loginForm.style.display = 'block';
            formTitle.textContent   = 'ログイン';
        });
    </script>
</body>
</html>
