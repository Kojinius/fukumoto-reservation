<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンス中 | 〇〇△△医院</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>(function(){try{var v=JSON.parse(localStorage.getItem("_themeVars"));if(v){var r=document.documentElement;Object.keys(v).forEach(function(k){r.style.setProperty(k,v[k]);});}}catch(e){}})();</script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .maintenance-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 40px 20px;
            text-align: center;
        }
        .maintenance-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .maintenance-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary, #3D2B1F);
            margin-bottom: 16px;
        }
        .maintenance-message {
            font-size: 15px;
            color: var(--text-secondary, #735763);
            line-height: 1.8;
            max-width: 480px;
            white-space: pre-wrap;
            margin-bottom: 24px;
        }
        .maintenance-period {
            font-size: 13px;
            color: var(--text-muted, #8B7355);
            margin-bottom: 32px;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 28px;
            background: var(--orange, #F79321);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-back:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header class="app-header">
        <div class="logo">
            <div class="logo-icon" id="maintenance-logo-icon">🔧</div>
            <div class="logo-text">
                <h1 id="clinic-name-heading">〇〇△△医院</h1>
                <span>ONLINE RESERVATION</span>
            </div>
        </div>
        <div class="header-right">
            <span class="header-phone" id="header-phone">☎ 0120-XXX-XXX</span>
        </div>
    </header>

    <main class="maintenance-wrap">
        <div class="maintenance-icon">🔧</div>
        <div class="maintenance-title">現在メンテナンス中です</div>
        <div class="maintenance-message" id="maintenance-message">
            システムメンテナンスのため、現在オンライン予約を一時停止しております。<br>
            ご不便をおかけして申し訳ございません。
        </div>
        <div class="maintenance-period" id="maintenance-period"></div>
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:32px;">
            ご予約はお電話にてお受けいたします。<br>
            <strong id="maintenance-phone">0120-XXX-XXX</strong>
        </p>
        <button class="btn-back" onclick="location.reload()">再読み込みして確認する</button>
    </main>

    <script type="module">
        import { db } from './js/firebase.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';
        import { applyTheme, esc } from './js/utils.js';

        const snap = await getDoc(doc(db, 'settings', 'clinic'));
        if (snap.exists()) {
            const s = snap.data();
            // 院名
            const name = s.clinicName;
            if (name) {
                const h1 = document.getElementById('clinic-name-heading');
                if (h1) h1.textContent = name;
                document.title = `メンテナンス中 | ${name}`;
            }
            // テーマ
            if (s.colorTheme) applyTheme(s.colorTheme);
            // 電話番号
            const ph = s.phone;
            if (ph) {
                const hPhone = document.getElementById('header-phone');
                if (hPhone) hPhone.textContent = `☎ ${ph}`;
                document.getElementById('maintenance-phone').textContent = ph;
            }
            // ロゴ
            if (s.clinicLogo) {
                const logoIcon = document.getElementById('maintenance-logo-icon');
                if (logoIcon) {
                    logoIcon.innerHTML = `<img src="${s.clinicLogo}" alt="ロゴ">`;
                    logoIcon.style.background = 'transparent';
                }
            }
            // お知らせメッセージを表示（あれば）
            const ann = s.announcement;
            if (ann && ann.message) {
                document.getElementById('maintenance-message').textContent = ann.message;
            }
            // メンテナンス期間（maintenance.startDate/endDate）を表示
            const maint = s.maintenance;
            if (maint && (maint.startDate || maint.endDate)) {
                const fmt = (v) => v ? v.replace('T', ' ') : '';
                const parts = [];
                if (maint.startDate) parts.push(`開始: ${fmt(maint.startDate)}`);
                if (maint.endDate)   parts.push(`終了: ${fmt(maint.endDate)}`);
                document.getElementById('maintenance-period').textContent = parts.join('　〜　');
            }
            // メンテナンス期間外ならトップへ戻す
            const d = new Date(), p = (n) => String(n).padStart(2, '0');
            const now = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
            const inMaintenance = maint
                && (!maint.startDate || now >= maint.startDate)
                && (!maint.endDate   || now <= maint.endDate);
            if (!inMaintenance) {
                window.location.replace('index.html');
            }
        }
    </script>
</body>
</html>
