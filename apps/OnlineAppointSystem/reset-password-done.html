<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード再設定完了 | 〇〇△△医院</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--beige);
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius-card);
            box-shadow: 0 8px 40px rgba(115,87,99,.13);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .done-icon {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: #F0FFF4;
            border: 2px solid #9AE6B4;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px;
        }
        .done-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .done-message {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 28px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="done-icon">&#10003;</div>
            <p class="done-title">パスワードの再設定が完了しました</p>
            <p class="done-message">新しいパスワードでログインしてください。</p>
            <a href="login.html" class="btn btn-primary" style="display:inline-block;">ログイン画面へ戻る</a>
        </div>
    </div>
</body>
</html>
