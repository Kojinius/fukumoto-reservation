<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約キャンセル | 〇〇△△医院</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cancel-wrapper {
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }
        .cancel-card {
            background: var(--white);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 32px 28px;
        }
        .cancel-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .cancel-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.7;
        }
        .cancel-info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .cancel-info-table td {
            padding: 9px 8px;
            border-bottom: 1px solid var(--beige-mid);
            vertical-align: top;
        }
        .cancel-info-table td:first-child {
            color: var(--text-muted);
            white-space: nowrap;
            width: 96px;
        }
        .cancel-info-table td:last-child {
            color: var(--text-primary);
            font-weight: 500;
        }
        .cancel-alert {
            background: #fff3f3;
            border: 1.5px solid #f5c0c0;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 13px;
            color: var(--red, #c0392b);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .cancel-success {
            text-align: center;
            padding: 12px 0 4px;
        }
        .cancel-success-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .cancel-success h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .cancel-success p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.8;
        }
        .error-msg {
            color: var(--red, #c0392b);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .btn-cancel-exec {
            width: 100%;
            height: 48px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-cancel-exec:hover { background: #c0392b; }
        .btn-cancel-exec:disabled { background: #ccc; cursor: default; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--orange);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo">
            <div class="logo-icon">鍼</div>
            <div class="logo-text">
                <h1 id="clinic-name-heading">〇〇△△医院</h1>
                <span>ONLINE RESERVATION</span>
            </div>
        </div>
        <div class="header-right">
            <span class="header-phone">☎ 0120-XXX-XXX</span>
        </div>
    </header>

    <!-- お知らせバナー -->
    <div id="announcement-banner" style="display:none;"></div>

    <main class="main">
        <div class="cancel-wrapper">

            <!-- 検索フォーム -->
            <div id="searchPanel">
                <div class="cancel-card">
                    <div class="cancel-title">予約キャンセル</div>
                    <p class="cancel-desc">
                        予約番号とご登録の電話番号を入力してください。<br>
                        予約番号は予約完了画面またはメールに記載されています。
                    </p>
                    <div class="form-group">
                        <label>予約番号<span class="required">必須</span></label>
                        <input type="text" id="inputBookingId" placeholder="例：ABC123xyz...">
                    </div>
                    <div class="form-group" style="margin-top:14px;">
                        <label>電話番号<span class="required">必須</span></label>
                        <input type="tel" id="inputPhone" placeholder="090-1234-5678">
                    </div>
                    <div class="error-msg" id="searchError"></div>
                    <button class="btn btn-primary" style="margin-top:20px;width:100%;height:48px;" onclick="searchBooking()">
                        予約を確認する
                    </button>
                </div>
            </div>

            <!-- 予約詳細 + キャンセルボタン -->
            <div id="detailPanel" style="display:none;">
                <div class="cancel-card">
                    <div class="cancel-title">予約内容の確認</div>
                    <p class="cancel-desc">以下の予約をキャンセルしますか？</p>
                    <table class="cancel-info-table" id="detailTable"></table>
                    <div id="cancelAlertBox"></div>
                    <div id="cancelActionBox"></div>
                    <a class="back-link" onclick="backToSearch()">← 検索に戻る</a>
                </div>
            </div>

            <!-- キャンセル完了 -->
            <div id="donePanel" style="display:none;">
                <div class="cancel-card">
                    <div class="cancel-success">
                        <div class="cancel-success-icon">✓</div>
                        <h2>キャンセルが完了しました</h2>
                        <p>
                            ご予約のキャンセルを受け付けました。<br>
                            またのご来院をお待ちしております。
                        </p>
                    </div>
                    <a class="back-link" style="margin-top:28px;" href="index.html">← 予約ページへ戻る</a>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="js/cancel.js"></script>
</body>
</html>
